<!-- tournaments.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Setup</title>
    <link rel="stylesheet" href="../settingsPanel.css">
    <style>
        /* Tournament Modal Styles */
        .tournament-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .tournament-container.active {
            opacity: 1;
            pointer-events: auto;
        }

        .tournament-modal {
            background: linear-gradient(135deg, #1a1f2e 0%, #0f1419 100%);
            border: 1px solid rgba(100, 200, 255, 0.2);
            border-radius: 12px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .tournament-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(100, 200, 255, 0.1);
        }

        .tournament-header svg {
            width: 24px;
            height: 24px;
            color: #64c8ff;
        }

        .tournament-header h2 {
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
            margin: 0;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #b0b8c1;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(100, 200, 255, 0.2);
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #64c8ff;
            background: rgba(100, 200, 255, 0.1);
            box-shadow: 0 0 12px rgba(100, 200, 255, 0.2);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .player-count-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
        }

        .player-count-btn {
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(100, 200, 255, 0.2);
            border-radius: 6px;
            color: #b0b8c1;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .player-count-btn:hover {
            border-color: #64c8ff;
            color: #64c8ff;
        }

        .player-count-btn.active {
            background: linear-gradient(135deg, #64c8ff 0%, #3d9fd6 100%);
            border-color: #64c8ff;
            color: #ffffff;
            box-shadow: 0 0 12px rgba(100, 200, 255, 0.3);
        }

        .form-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(100, 200, 255, 0.1);
        }

        .btn-primary {
            flex: 1;
            padding: 0.75rem;
            background: linear-gradient(135deg, #64c8ff 0%, #3d9fd6 100%);
            border: none;
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(100, 200, 255, 0.3);
        }

        .btn-secondary {
            flex: 1;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(100, 200, 255, 0.2);
            border-radius: 6px;
            color: #b0b8c1;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            border-color: #64c8ff;
            color: #64c8ff;
            background: rgba(100, 200, 255, 0.1);
        }

        /* Tournament Bracket Card */
        .tournament-card {
            background: linear-gradient(135deg, rgba(26, 31, 46, 0.8) 0%, rgba(15, 20, 25, 0.8) 100%);
            border: 1px solid rgba(100, 200, 255, 0.2);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tournament-card:hover {
            border-color: #64c8ff;
            background: linear-gradient(135deg, rgba(26, 31, 46, 1) 0%, rgba(15, 20, 25, 1) 100%);
            box-shadow: 0 4px 16px rgba(100, 200, 255, 0.2);
        }

        .tournament-card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 0.75rem;
        }

        .tournament-card-title {
            font-size: 16px;
            font-weight: 600;
            color: #64c8ff;
        }

        .tournament-card-status {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(100, 200, 255, 0.1);
            border: 1px solid rgba(100, 200, 255, 0.3);
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            color: #64c8ff;
            text-transform: uppercase;
        }

        .tournament-card-status.in-progress {
            background: rgba(76, 175, 80, 0.1);
            border-color: rgba(76, 175, 80, 0.3);
            color: #4caf50;
        }

        .tournament-card-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            font-size: 13px;
            color: #b0b8c1;
        }

        .tournament-detail {
            display: flex;
            flex-direction: column;
        }

        .tournament-detail-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #7a8591;
            margin-bottom: 0.25rem;
        }

        .tournament-detail-value {
            font-weight: 600;
            color: #ffffff;
        }

        /* Bracket Visualization */
        .bracket-container {
            display: flex;
            gap: 2rem;
            overflow-x: auto;
            padding: 1rem;
            background: rgba(15, 20, 25, 0.5);
            border-radius: 8px;
            margin-top: 1rem;
        }

        .bracket-round {
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .bracket-round-title {
            font-size: 12px;
            font-weight: 600;
            color: #7a8591;
            text-transform: uppercase;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid rgba(100, 200, 255, 0.1);
        }

        .match-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(100, 200, 255, 0.15);
            border-radius: 6px;
            padding: 0.75rem;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        .match-player {
            padding: 0.5rem;
            border-radius: 4px;
            font-size: 13px;
            color: #b0b8c1;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .match-player:hover {
            background: rgba(100, 200, 255, 0.1);
            color: #64c8ff;
        }

        .match-player.winner {
            background: rgba(76, 175, 80, 0.1);
            color: #4caf50;
            font-weight: 600;
        }

        .match-player.pending {
            color: #7a8591;
        }

        .bracket-divider {
            height: 1px;
            background: rgba(100, 200, 255, 0.1);
            margin: 0.25rem 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .tournament-modal {
                max-width: 100%;
                width: 95%;
                padding: 1.5rem;
            }

            .player-count-selector {
                grid-template-columns: repeat(2, 1fr);
            }

            .tournament-card-details {
                grid-template-columns: 1fr;
            }

            .bracket-container {
                gap: 1rem;
            }

            .bracket-round {
                min-width: 150px;
            }
        }
    </style>
</head>
<body>
    <!-- Tournament Setup Modal -->
    <div class="tournament-container" id="tournamentContainer">
        <div class="tournament-modal">
            <div class="tournament-header">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>
                <h2>Create Tournament</h2>
            </div>

            <form id="tournamentForm">
                <div class="form-group">
                    <label for="tournamentName">Tournament Name</label>
                    <input type="text" id="tournamentName" placeholder="Enter tournament name" required>
                </div>

                <div class="form-group">
                    <label for="tournamentDesc">Description</label>
                    <textarea id="tournamentDesc" placeholder="Optional tournament description" rows="2"></textarea>
                </div>

                <div class="form-group">
                    <label>Number of Players</label>
                    <div class="player-count-selector">
                        <button type="button" class="player-count-btn" data-count="4">4</button>
                        <button type="button" class="player-count-btn" data-count="8">8</button>
                        <button type="button" class="player-count-btn" data-count="16">16</button>
                        <button type="button" class="player-count-btn" data-count="32">32</button>
                        <button type="button" class="player-count-btn" data-count="64">64</button>
                        <button type="button" class="player-count-btn" data-count="128">128</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="tournamentFormat">Tournament Format</label>
                    <select id="tournamentFormat" required>
                        <option value="">Select format...</option>
                        <option value="single">Single Elimination</option>
                        <option value="double">Double Elimination</option>
                        <option value="round-robin">Round Robin</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="tournamentRules">Rules</label>
                    <textarea id="tournamentRules" placeholder="Optional tournament rules" rows="2"></textarea>
                </div>

                <div class="form-group">
                    <label for="tournamentPrize">Prize</label>
                    <input type="text" id="tournamentPrize" placeholder="Optional prize information">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Create Tournament</button>
                    <button type="button" class="btn-secondary" onclick="closeTournamentModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Tournament List -->
    <div id="tournamentsList" class="tournaments-list"></div>

    <script src="tournaments.js"></script>
</body>
</html>
