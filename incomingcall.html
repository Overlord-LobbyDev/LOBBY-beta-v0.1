<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Incoming Call</title>
  <link rel="stylesheet" href="transitions.css" />
  <script src="nav.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-0:#1e1f22; --bg-1:#2b2d31; --bg-2:#313338;
      --accent:#5865f2; --danger:#ed4245; --green:#23a55a;
      --text-1:#f2f3f5; --text-2:#b5bac1; --text-3:#80848e;
      --font:"gg sans","Noto Sans",Whitney,Helvetica Neue,Helvetica,Arial,sans-serif;
    }

    body {
      background: var(--bg-1);
      color: var(--text-1);
      font-family: var(--font);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 32px 40px;
      width: 100%;
    }

    /* Pulsing ring animation around avatar */
    .avatar-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring {
      position: absolute;
      width: 96px; height: 96px;
      border-radius: 50%;
      border: 3px solid var(--green);
      animation: ring-pulse 1.5s ease-out infinite;
      opacity: 0;
    }
    .ring:nth-child(2) { animation-delay: 0.5s; }
    .ring:nth-child(3) { animation-delay: 1s; }

    @keyframes ring-pulse {
      0%   { transform: scale(1);   opacity: .6; }
      100% { transform: scale(1.8); opacity: 0;  }
    }

    .caller-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 800;
      overflow: hidden;
      position: relative;
      z-index: 1;
      border: 3px solid var(--bg-1);
    }
    .caller-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .call-info { text-align: center; }
    .call-label { font-size: 13px; color: var(--text-3); margin-bottom: 4px; }
    .caller-name { font-size: 24px; font-weight: 800; }

    /* Countdown ring */
    .countdown-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-3);
    }
    #countdown {
      font-weight: 700;
      color: var(--text-2);
      min-width: 24px;
      text-align: center;
    }
    .countdown-bar-wrap {
      width: 120px; height: 3px;
      background: var(--bg-2);
      border-radius: 2px;
      overflow: hidden;
    }
    .countdown-bar {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      transition: width 1s linear;
    }

    /* Buttons */
    .call-btns {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .call-action {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .call-btn {
      width: 60px; height: 60px;
      border-radius: 50%; border: none;
      font-size: 24px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s, filter .15s;
    }
    .call-btn:hover { transform: scale(1.1); filter: brightness(1.15); }
    .call-btn:active { transform: scale(.95); }

    .btn-accept { background: var(--green); }
    .btn-decline { background: var(--danger); }

    .call-btn-label {
      font-size: 12px;
      color: var(--text-3);
      font-weight: 600;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="avatar-wrap">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="caller-avatar" id="callerAvatar">?</div>
  </div>

  <div class="call-info">
    <div class="call-label">Incoming video call</div>
    <div class="caller-name" id="callerName">Loading…</div>
  </div>

  <div class="countdown-wrap">
    <span>Auto-declining in</span>
    <span id="countdown">30</span>s
    <div class="countdown-bar-wrap">
      <div class="countdown-bar" id="countdownBar" style="width:100%"></div>
    </div>
  </div>

  <div class="call-btns">
    <div class="call-action">
      <button class="call-btn btn-decline" id="declineBtn">📵</button>
      <span class="call-btn-label">Decline</span>
    </div>
    <div class="call-action">
      <button class="call-btn btn-accept" id="acceptBtn">📞</button>
      <span class="call-btn-label">Accept</span>
    </div>
  </div>
</div>

<script>
  // Read call data passed via localStorage
  const callData = JSON.parse(localStorage.getItem("incomingCall") || "{}");
  const { fromPeerId, fromUsername, fromAvatarUrl } = callData;

  document.getElementById("callerName").textContent = fromUsername || "Unknown";

  const avatarEl = document.getElementById("callerAvatar");
  if (fromAvatarUrl) {
    avatarEl.innerHTML = `<img src="${fromAvatarUrl}" alt="${fromUsername}" />`;
  } else {
    avatarEl.textContent = (fromUsername || "?").slice(0, 1).toUpperCase();
  }

  // Countdown timer
  let seconds = 30;
  const countdownEl  = document.getElementById("countdown");
  const countdownBar = document.getElementById("countdownBar");

  const timer = setInterval(() => {
    seconds--;
    countdownEl.textContent = seconds;
    countdownBar.style.width = `${(seconds / 30) * 100}%`;
    if (seconds <= 0) decline();
  }, 1000);

  function accept() {
    clearInterval(timer);
    localStorage.setItem("callResponse", JSON.stringify({ accepted: true, fromPeerId, fromUsername }));
    window.close();
  }

  function decline() {
    clearInterval(timer);
    localStorage.setItem("callResponse", JSON.stringify({ accepted: false, fromPeerId, fromUsername }));
    window.close();
  }

  document.getElementById("acceptBtn").addEventListener("click", accept);
  document.getElementById("declineBtn").addEventListener("click", decline);
</script>
</body>
</html>
