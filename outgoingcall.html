<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Calling…</title>
  <link rel="stylesheet" href="transitions.css" />
  <script src="nav.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-0:#1e1f22; --bg-1:#2b2d31; --bg-2:#313338;
      --accent:#5865f2; --danger:#ed4245; --green:#23a55a;
      --text-1:#f2f3f5; --text-2:#b5bac1; --text-3:#80848e;
      --font:"gg sans","Noto Sans",Whitney,Helvetica Neue,Helvetica,Arial,sans-serif;
    }

    body {
      background: var(--bg-1);
      color: var(--text-1);
      font-family: var(--font);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 32px 40px;
      width: 100%;
    }

    /* Pulsing ring animation */
    .avatar-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring {
      position: absolute;
      width: 96px; height: 96px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      animation: ring-pulse 1.5s ease-out infinite;
      opacity: 0;
    }
    .ring:nth-child(2) { animation-delay: 0.5s; }
    .ring:nth-child(3) { animation-delay: 1s; }

    @keyframes ring-pulse {
      0%   { transform: scale(1);   opacity: .6; }
      100% { transform: scale(1.8); opacity: 0;  }
    }

    .callee-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 800;
      overflow: hidden;
      position: relative;
      z-index: 1;
      border: 3px solid var(--bg-1);
    }
    .callee-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .call-info { text-align: center; }
    .call-label {
      font-size: 13px; color: var(--text-3); margin-bottom: 4px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .dot-anim span {
      display: inline-block;
      animation: dot-bounce .8s infinite;
      font-size: 18px; line-height: 1;
    }
    .dot-anim span:nth-child(2) { animation-delay: .2s; }
    .dot-anim span:nth-child(3) { animation-delay: .4s; }

    @keyframes dot-bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .4; }
      40%            { transform: translateY(-4px); opacity: 1; }
    }

    .callee-name { font-size: 24px; font-weight: 800; }

    /* Countdown */
    .countdown-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-3);
    }
    #countdown { font-weight: 700; color: var(--text-2); min-width: 24px; text-align: center; }
    .countdown-bar-wrap {
      width: 120px; height: 3px;
      background: var(--bg-2); border-radius: 2px; overflow: hidden;
    }
    .countdown-bar {
      height: 100%; background: var(--accent);
      border-radius: 2px; transition: width 1s linear;
    }

    /* Cancel button */
    .call-action {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .call-btn {
      width: 60px; height: 60px;
      border-radius: 50%; border: none;
      font-size: 24px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s, filter .15s;
      background: var(--danger);
    }
    .call-btn:hover { transform: scale(1.1); filter: brightness(1.15); }
    .call-btn:active { transform: scale(.95); }
    .call-btn-label { font-size: 12px; color: var(--text-3); font-weight: 600; }
  </style>
</head>
<body>
<div class="card">
  <div class="avatar-wrap">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="callee-avatar" id="calleeAvatar">?</div>
  </div>

  <div class="call-info">
    <div class="call-label">
      Calling
      <span class="dot-anim">
        <span>.</span><span>.</span><span>.</span>
      </span>
    </div>
    <div class="callee-name" id="calleeName">Loading…</div>
  </div>

  <div class="countdown-wrap">
    <span>Cancels in</span>
    <span id="countdown">30</span>s
    <div class="countdown-bar-wrap">
      <div class="countdown-bar" id="countdownBar" style="width:100%"></div>
    </div>
  </div>

  <div class="call-action">
    <button class="call-btn" id="cancelBtn">📵</button>
    <span class="call-btn-label">Cancel</span>
  </div>
</div>

<script>
  const callData = JSON.parse(localStorage.getItem("outgoingCall") || "{}");
  const { toUsername, toAvatarUrl } = callData;

  document.getElementById("calleeName").textContent = toUsername || "Unknown";

  const avatarEl = document.getElementById("calleeAvatar");
  if (toAvatarUrl) {
    avatarEl.innerHTML = `<img src="${toAvatarUrl}" alt="${toUsername}" />`;
  } else {
    avatarEl.textContent = (toUsername || "?").slice(0, 1).toUpperCase();
  }

  // Countdown
  let seconds = 30;
  const countdownEl  = document.getElementById("countdown");
  const countdownBar = document.getElementById("countdownBar");

  const timer = setInterval(() => {
    seconds--;
    countdownEl.textContent = seconds;
    countdownBar.style.width = `${(seconds / 30) * 100}%`;
    if (seconds <= 0) cancel();
  }, 1000);

  // Poll for call being answered or cancelled by chat page
  const pollTimer = setInterval(() => {
    const response = localStorage.getItem("outgoingCallResponse");
    if (response) {
      clearInterval(pollTimer);
      clearInterval(timer);
      localStorage.removeItem("outgoingCallResponse");
      window.close();
    }
  }, 500);

  function cancel() {
    clearInterval(timer);
    clearInterval(pollTimer);
    localStorage.setItem("outgoingCallCancelled", "true");
    window.close();
  }

  document.getElementById("cancelBtn").addEventListener("click", cancel);
</script>
</body>
</html>
