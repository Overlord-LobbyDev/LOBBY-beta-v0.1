<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tournament Bracket</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-0: #0f1419;
      --bg-1: #141922;
      --bg-2: #1a2332;
      --bg-3: #232d3d;
      --accent: #f9a8d4;
      --accent-dark: #f472b6;
      --success: #23a55a;
      --danger: #ed4245;
      --text-1: #fdf2f8;
      --text-2: #fce7f3;
      --text-3: #fbcfe8;
      --divider: rgba(255, 255, 255, 0.06);
    }

    html, body { height: 100%; }

    body {
      background: linear-gradient(135deg, var(--bg-0) 0%, var(--bg-1) 100%);
      color: var(--text-1);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ════════ HEADER ════════ */
    .header {
      background: linear-gradient(135deg, rgba(26, 35, 50, 0.8), rgba(249, 168, 212, 0.05));
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--divider);
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
      flex: 1;
      min-width: 0;
    }

    .header-back {
      background: transparent;
      border: none;
      color: var(--text-2);
      cursor: pointer;
      font-size: 24px;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .header-back:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-1);
    }

    .header-info h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      color: var(--text-1);
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .meta-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(88, 101, 242, 0.1);
      border: 1px solid rgba(88, 101, 242, 0.25);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
    }

    .status-badge {
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: rgba(35, 165, 90, 0.15);
      color: var(--success);
      border: 1px solid rgba(35, 165, 90, 0.3);
    }

    .status-badge.completed {
      background: rgba(88, 101, 242, 0.15);
      color: #5865f2;
      border-color: rgba(88, 101, 242, 0.3);
    }

    /* ════════ MAIN CONTENT ════════ */
    .main {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 280px;
      background: rgba(20, 25, 34, 0.6);
      border-right: 1px solid var(--divider);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar-section {
      padding: 20px;
      border-bottom: 1px solid var(--divider);
    }

    .sidebar-title {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-3);
      margin-bottom: 12px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-card {
      background: rgba(88, 101, 242, 0.08);
      border: 1px solid rgba(88, 101, 242, 0.15);
      border-radius: 6px;
      padding: 12px;
      text-align: center;
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-3);
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 800;
      color: var(--accent);
    }

    .players-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .player-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: rgba(88, 101, 242, 0.08);
      border: 1px solid rgba(88, 101, 242, 0.15);
      border-radius: 6px;
      transition: all 0.2s;
    }

    .player-badge:hover {
      background: rgba(88, 101, 242, 0.12);
      border-color: rgba(88, 101, 242, 0.25);
    }

    .player-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 11px;
      flex-shrink: 0;
    }

    .player-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-2);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ════════ BRACKET AREA ════════ */
    .bracket-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .bracket-header {
      padding: 16px 24px;
      background: rgba(26, 35, 50, 0.4);
      border-bottom: 1px solid var(--divider);
      flex-shrink: 0;
    }

    .bracket-header h2 {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-2);
    }

    .bracket-scroll {
      flex: 1;
      overflow-x: auto;
      overflow-y: auto;
      padding: 32px;
      background: linear-gradient(135deg, rgba(15, 20, 25, 0.6), rgba(249, 168, 212, 0.02));
    }

    .bracket {
      display: flex;
      gap: 60px;
      min-width: fit-content;
      height: fit-content;
    }

    .bracket-round {
      display: flex;
      flex-direction: column;
      gap: 20px;
      flex-shrink: 0;
    }

    .round-label {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-3);
      text-align: center;
      height: 28px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .matches-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .match {
      width: 220px;
      background: linear-gradient(135deg, rgba(88, 101, 242, 0.12), rgba(249, 168, 212, 0.06));
      border: 2px solid rgba(88, 101, 242, 0.2);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .match:hover {
      border-color: rgba(88, 101, 242, 0.5);
      box-shadow: 0 12px 32px rgba(249, 168, 212, 0.1);
      transform: translateY(-2px);
    }

    .match-player {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 6px;
      font-size: 13px;
      transition: all 0.2s;
    }

    .match-player.winner {
      background: rgba(35, 165, 90, 0.18);
      border-left: 3px solid var(--success);
      padding-left: 7px;
    }

    .player-info {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .player-name-match {
      flex: 1;
      font-weight: 500;
      color: var(--text-1);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .player-score {
      background: rgba(88, 101, 242, 0.15);
      border: 1px solid rgba(88, 101, 242, 0.25);
      padding: 4px 10px;
      border-radius: 4px;
      color: var(--accent);
      font-weight: 700;
      font-size: 12px;
      min-width: 45px;
      text-align: center;
    }

    .match-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
    }

    /* ════════ EMPTY STATE ════════ */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-3);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-text {
      font-size: 14px;
      text-align: center;
    }

    /* ════════ SCROLLBARS ════════ */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb {
      background: rgba(249, 168, 212, 0.25);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(249, 168, 212, 0.4);
    }
    ::-webkit-scrollbar-track { background: transparent; }

    /* ════════ ANIMATIONS ════════ */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .match {
      animation: fadeIn 0.4s ease forwards;
    }

    .match:nth-child(1) { animation-delay: 0ms; }
    .match:nth-child(2) { animation-delay: 60ms; }
    .match:nth-child(3) { animation-delay: 120ms; }
    .match:nth-child(4) { animation-delay: 180ms; }
    .match:nth-child(5) { animation-delay: 240ms; }

    /* ════════ RESPONSIVE ════════ */
    @media (max-width: 1024px) {
      .sidebar { width: 240px; }
      .match { width: 180px; }
      .bracket { gap: 40px; }
    }

    @media (max-width: 768px) {
      .header { flex-direction: column; align-items: flex-start; gap: 16px; }
      .main { flex-direction: column; }
      .sidebar { width: 100%; max-height: 200px; border-right: none; border-bottom: 1px solid var(--divider); }
      .match { width: 160px; }
      .bracket { gap: 24px; }
      .bracket-scroll { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <button class="header-back" onclick="window.history.back()" title="Go back">←</button>
    <div class="header-info">
      <h1 id="tournamentName">Loading...</h1>
      <div class="header-meta">
        <div class="meta-badge">
          <span>📊</span>
          <span id="playerCount">0/0</span>
        </div>
        <div class="meta-badge">
          <span>📋</span>
          <span id="formatLabel">—</span>
        </div>
        <div class="status-badge" id="statusBadge">—</div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Stats</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Format</div>
          <div class="stat-value" id="formatStat">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Status</div>
          <div class="stat-value" id="statusStat" style="font-size: 12px;">—</div>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">Players</div>
      <div class="players-list" id="playersList">
        <div style="color: var(--text-3); font-size: 12px;">Loading...</div>
      </div>
    </div>
  </div>

  <!-- BRACKET AREA -->
  <div class="bracket-area">
    <div class="bracket-header">
      <h2>Tournament Bracket</h2>
    </div>
    <div class="bracket-scroll">
      <div id="bracketContainer"></div>
    </div>
  </div>
</div>

<script>
  const API_BASE = 'https://lobby-websocket-server.onrender.com';
  const TOURNAMENT_ID = new URLSearchParams(window.location.search).get('id');
  const token = localStorage.getItem('vh_token') || sessionStorage.getItem('vh_token');

  if (!token || !TOURNAMENT_ID) {
    document.body.innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #f44336;">Invalid tournament or not authenticated</div>';
  }

  async function loadTournament() {
    try {
      const response = await fetch(`${API_BASE}/api/tournaments/${TOURNAMENT_ID}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!response.ok) throw new Error('Failed to load');
      
      const tournament = await response.json();
      renderTournament(tournament);
    } catch (error) {
      console.error('Error:', error);
      document.getElementById('bracketContainer').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">❌</div>
          <div class="empty-text">Failed to load tournament</div>
        </div>
      `;
    }
  }

  function renderTournament(t) {
    // Header
    document.getElementById('tournamentName').textContent = t.name || 'Tournament';
    const players = t.registeredPlayers || [];
    document.getElementById('playerCount').textContent = `${players.length}/${t.playerCount}`;
    
    const formats = { 'single': 'Single', 'double': 'Double', 'round-robin': 'Round Robin' };
    document.getElementById('formatLabel').textContent = formats[t.format] || t.format;
    
    const badge = document.getElementById('statusBadge');
    badge.className = `status-badge ${t.status === 'completed' ? 'completed' : ''}`;
    badge.textContent = t.status.toUpperCase();
    
    // Sidebar
    document.getElementById('formatStat').textContent = (formats[t.format] || t.format).split(' ')[0];
    document.getElementById('statusStat').textContent = t.status;
    
    // Players
    const playersList = document.getElementById('playersList');
    if (players.length === 0) {
      playersList.innerHTML = '<div style="color: var(--text-3); font-size: 12px;">No players yet</div>';
    } else {
      playersList.innerHTML = players.map(p => `
        <div class="player-badge">
          <div class="player-avatar">${(p.username || '?')[0].toUpperCase()}</div>
          <div class="player-name">${p.username || 'Unknown'}</div>
        </div>
      `).join('');
    }
    
    // Bracket
    renderBracket(t);
  }

  function renderBracket(t) {
    const bracket = t.bracket || { rounds: [] };
    const hasMatches = bracket.rounds?.some(r => r.matches?.length > 0);
    const container = document.getElementById('bracketContainer');
    
    if (!hasMatches) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🏆</div>
          <div class="empty-text">${t.status === 'setup' ? 'Bracket will be generated once registration closes' : 'No bracket yet'}</div>
        </div>
      `;
      return;
    }
    
    container.innerHTML = `
      <div class="bracket">
        ${bracket.rounds.map(round => `
          <div class="bracket-round">
            <div class="round-label">Round ${round.roundNumber}</div>
            <div class="matches-container">
              ${(round.matches || []).map(match => `
                <div class="match">
                  <div class="match-player ${match.player1?.userId === match.winner ? 'winner' : ''}">
                    <div class="player-info">
                      <div class="player-name-match">${match.player1?.username || '?'}</div>
                    </div>
                    <div class="player-score">${match.player1Score || 0}</div>
                  </div>
                  <div class="match-divider"></div>
                  <div class="match-player ${match.player2?.userId === match.winner ? 'winner' : ''}">
                    <div class="player-info">
                      <div class="player-name-match">${match.player2?.username || '?'}</div>
                    </div>
                    <div class="player-score">${match.player2Score || 0}</div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }

  loadTournament();
  setInterval(loadTournament, 5000); // Refresh every 5s
</script>

</body>
</html>
