<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>LOBBY</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{
      width:100%;height:100%;
      background:#000;
      overflow:hidden;user-select:none;
      -webkit-app-region:drag;
    }
    #c{position:fixed;inset:0;display:block;}

    /* ── UI layer ── */
    #ui{
      position:fixed;inset:0;
      display:flex;align-items:center;justify-content:center;
      pointer-events:none;z-index:10;
    }

    #outerWrap{
      display:flex;flex-direction:column;align-items:center;gap:14px;
    }

    #iconImg{
      display:block;
      width:82px;height:82px;
      border-radius:20px;
      opacity:0;
      transform:scale(0.7);
      transition:opacity .5s ease,
                 transform .5s cubic-bezier(0.34,1.4,0.64,1);
    }
    #iconImg.show{opacity:1;transform:scale(1);}

    /* SVG icon box */
    #iconBox{
      width:82px;height:82px;
      border-radius:20px;
      display:flex;align-items:center;justify-content:center;
      opacity:0;transform:scale(0.7);
      transition:opacity .5s ease, transform .5s cubic-bezier(0.34,1.4,0.64,1);
      /* background will be set by JS to accent at 20% opacity */
    }
    #iconBox.show{opacity:1;transform:scale(1);}

    /* LOBBY + vertical BETA side by side */
    #wordWrap{
      display:inline-flex;
      align-items:stretch; /* children fill full height */
      opacity:0;
      transform:translateY(10px);
      transition:opacity .55s cubic-bezier(0.16,1,0.3,1),
                 transform .55s cubic-bezier(0.16,1,0.3,1);
    }
    #wordWrap.show{opacity:1;transform:translateY(0);}

    #lobby{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(48px,6.5vw,82px);
      letter-spacing:0.09em;
      line-height:1;
      color:#f9a8d4;
    }

    /* BETA: vertical stack, flush right of Y, same height as LOBBY text */
    #betaTag{
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      margin-left:4px;
      padding-bottom:3px;
    }
    #betaTag span{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(8px,1vw,12px);
      letter-spacing:0.05em;
      line-height:1.15;
      display:block;
      color:#f9a8d4;
      opacity:0.55;
    }
  </style>
</head>
<body>

<!-- Seasonal edition badge -->
<div style="
  position:fixed;top:18px;left:18px;z-index:20;
  display:flex;align-items:center;gap:7px;
  font-family:'Bebas Neue',sans-serif;
  font-size:13px;letter-spacing:2px;
  color:#bae6fd;
  opacity:0;
  animation:badgeFadeIn .6s ease 2s forwards;
  text-shadow:0 0 12px #bae6fd88;
  -webkit-app-region:no-drag;
">
  <span style="font-size:15px">❄️</span>
  Winter Edition
</div>
<style>
@keyframes badgeFadeIn {
  from{opacity:0;transform:translateX(-6px)}
  to  {opacity:0.75;transform:translateX(0)}
}
</style>

<canvas id="c"></canvas>

<div id="ui">
  <div id="outerWrap">
    <div id="iconBox">
      <!-- The L-mark logo, recoloured by JS -->
      <svg id="iconSvg" width="52" height="52" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <rect x="14" y="8"  width="8" height="32" rx="2" fill="white"/>
        <rect x="14" y="32" width="22" height="8"  rx="2" fill="white"/>
      </svg>
    </div>
    <div id="wordWrap">
      <div id="lobby">LOBBY</div>
      <div id="betaTag">
        <span>B</span>
        <span>E</span>
        <span>T</span>
        <span>A</span>
      </div>
    </div>
  </div>
</div>

  minecraft:{accent:"#15803d",t2:"#bbf7d0",bg:"#0e1008"},zelda:{accent:"#65a30d",t2:"#d9f99d",bg:"#0e1000"},mario:{accent:"#ef4444",t2:"#fecaca",bg:"#1a0400"},pokemon_game:{accent:"#ef4444",t2:"#fecaca",bg:"#030c1a"},halo:{accent:"#15803d",t2:"#bbf7d0",bg:"#030d18"},cod:{accent:"#94a3b8",t2:"#e2e8f0",bg:"#080c08"},gta:{accent:"#ef4444",t2:"#fecaca",bg:"#030c18"},cyberpunk:{accent:"#facc15",t2:"#fef9c3",bg:"#080414"},witcher:{accent:"#d97706",t2:"#fde68a",bg:"#0c0c08"},dark_souls:{accent:"#f59e0b",t2:"#fde68a",bg:"#080608"},elden_ring:{accent:"#d97706",t2:"#fde68a",bg:"#080608"},fortnite:{accent:"#a855f7",t2:"#e9d5ff",bg:"#030c18"},apex:{accent:"#dc2626",t2:"#fecaca",bg:"#0e0408"},overwatch:{accent:"#f97316",t2:"#fdba74",bg:"#030c18"},league:{accent:"#1d4ed8",t2:"#bfdbfe",bg:"#060e14"},valorant:{accent:"#ef4444",t2:"#fecaca",bg:"#0e0408"},csgo:{accent:"#f97316",t2:"#fdba74",bg:"#030c18"},hollow_knight:{accent:"#a78bfa",t2:"#ddd6fe",bg:"#060810"},celeste:{accent:"#f472b6",t2:"#fbcfe8",bg:"#0a0c18"},stardew:{accent:"#4ade80",t2:"#bbf7d0",bg:"#061008"},undertale:{accent:"#ef4444",t2:"#fecaca",bg:"#040608"},skyrim:{accent:"#94a3b8",t2:"#e2e8f0",bg:"#080c10"},fallout:{accent:"#facc15",t2:"#fef9c3",bg:"#0c1008"},doom:{accent:"#dc2626",t2:"#fecaca",bg:"#0e0408"},
};

const tid   = localStorage.getItem("lobby_theme")||"default";
const theme = THEMES[tid]||THEMES.default;
const ACCENT = theme.accent;
const T2     = theme.t2;
const BG     = theme.bg;

// Apply bg to body immediately so no flash
document.body.style.background = BG;

// Apply colours
const lobbyEl = document.getElementById("lobby");
lobbyEl.style.color = ACCENT;
lobbyEl.style.textShadow = `0 0 50px ${ACCENT}55`;
document.querySelectorAll("#betaTag span").forEach(s=>{ s.style.color = T2; });

// Icon box — accent background tint + glow
const iconBox = document.getElementById("iconBox");
iconBox.style.background = `${ACCENT}22`;
iconBox.style.boxShadow  = `0 0 32px ${ACCENT}66, 0 0 8px ${ACCENT}33, inset 0 0 0 1.5px ${ACCENT}44`;

function hexRgb(h){
  h=h.replace("#","");
  if(h.length===3) h=h.split("").map(c=>c+c).join("");
  return{r:parseInt(h.slice(0,2),16),g:parseInt(h.slice(2,4),16),b:parseInt(h.slice(4,6),16)};
}
const AC=hexRgb(ACCENT), acS=`${AC.r},${AC.g},${AC.b}`;
const BGC=hexRgb(BG);

// ── Canvas ────────────────────────────────────────────────────
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
resize();addEventListener("resize",resize);


// ── ❄️ WINTER snow system ─────────────────────────────────────
const FLAKE_COUNT = 180;
const FLAKES = Array.from({length:FLAKE_COUNT}, () => ({
  fx: Math.random(), // fractional x (0-1), resolved to canvas.width each frame
  fy: Math.random(), // fractional y (0-1), resolved to canvas.height each frame
  x: 0, y: 0,       // actual pixel positions, set on first draw
  vy: 25+Math.random()*55,
  vx: (Math.random()-.5)*18,
  size: .4+Math.random()*4.2,
  alpha: .2+Math.random()*.75,
  wobble: Math.random()*Math.PI*2,
  wobbleS: .3+Math.random()*.5,
  delay: Math.random()*1000,
  flakeType: Math.floor(Math.random()*3), // 0=dot, 1=cross, 2=star
}));

function drawSnowflake(x,y,size,type,alpha){
  ctx.save(); ctx.globalAlpha=alpha;
  if(type===0){
    ctx.beginPath(); ctx.arc(x,y,size,0,Math.PI*2);
    ctx.fillStyle='white'; ctx.fill();
  } else {
    ctx.strokeStyle='white'; ctx.lineWidth=Math.max(.5,size*.4);
    ctx.lineCap='round';
    const arms = type===1?2:3;
    for(let i=0;i<arms;i++){
      const a=(i/arms)*Math.PI;
      ctx.beginPath();
      ctx.moveTo(x+Math.cos(a)*size*2, y+Math.sin(a)*size*2);
      ctx.lineTo(x-Math.cos(a)*size*2, y-Math.sin(a)*size*2);
      ctx.stroke();
      // small branches
      if(size>1.5){
        for(let b=-1;b<=1;b+=2){
          const bx=x+Math.cos(a)*size*.8, by=y+Math.sin(a)*size*.8;
          const ba=a+b*.5;
          ctx.beginPath();
          ctx.moveTo(bx,by);
          ctx.lineTo(bx+Math.cos(ba)*size*.7,by+Math.sin(ba)*size*.7);
          ctx.stroke();
        }
      }
    }
  }
  ctx.restore();
}

function drawSnow(t,W,H){
  const dtSec=1/60;
  FLAKES.forEach(f=>{
    // Initialise pixel position from canvas size on first draw
    if(f.x===0 && f.y===0){ f.x=f.fx*W; f.y=f.fy*H; }
    if(t<f.delay)return;
    const wx=Math.sin(t*.001*f.wobbleS+f.wobble)*20;
    f.x+=(f.vx+wx)*dtSec;
    f.y+=f.vy*dtSec;
    if(f.y>H+10){f.y=-10;f.x=Math.random()*W;}
    if(f.x<-10) f.x=W+10;
    if(f.x>W+10)f.x=-10;
    // Subtle frost glint
    if(f.size>2.2 && Math.random()>.96){
      const gr=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.size*4);
      gr.addColorStop(0,'rgba(200,230,255,0.15)');
      gr.addColorStop(1,'transparent');
      ctx.fillStyle=gr; ctx.fillRect(f.x-f.size*4,f.y-f.size*4,f.size*8,f.size*8);
    }
    drawSnowflake(f.x,f.y,f.size,f.flakeType,f.alpha);
  });
}

function easeOut(t){return 1-Math.pow(1-t,3);}
function easeOut5(t){return 1-Math.pow(1-t,5);}
function easeInOut(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function easeIn(t){return t*t*t;}

// ── STREAM SYSTEM ─────────────────────────────────────────────
// 8 bright laser streams shoot in from random screen edges,
// each with a long glowing tail and a bright head.
// They spiral inward at high speed, tightening each loop,
// then slam into the centre triggering a shockwave + debris burst.

const STREAM_COUNT = 12;
const streams = Array.from({length: STREAM_COUNT}, (_, i) => {
  const angle = (i / STREAM_COUNT) * Math.PI * 2;
  const diagBase = Math.sqrt(innerWidth * innerWidth + innerHeight * innerHeight) * 0.55;
  const dist = diagBase + Math.random() * 150;
  return {
    baseAngle: angle,
    startR: dist,
    // Each stream has slightly different speed
    speed: 0.85 + Math.random() * 0.3,
    // Tail length in history points
    tailLen: 28 + Math.floor(Math.random() * 16),
    width: 2.0 + Math.random() * 2.0,
    history: [],
    done: false,
  };
});

// ── DEBRIS (post-impact scatter) ─────────────────────────────
let debris = [];
let shockwaveR = 0;
let shockwaveAlpha = 0;
let impacted = false;

function spawnDebris(cx, cy) {
  debris = Array.from({length: 60}, () => {
    const a = Math.random() * Math.PI * 2;
    const speed = 80 + Math.random() * 220;
    return {
      x: cx, y: cy,
      vx: Math.cos(a) * speed,
      vy: Math.sin(a) * speed,
      life: 1,
      decay: 0.018 + Math.random() * 0.022,
      size: 0.8 + Math.random() * 2.2,
      bright: Math.random() > 0.6, // some are bright white
    };
  });
  shockwaveR = 0;
  shockwaveAlpha = 1;
}

// ── TIMELINE ──────────────────────────────────────────────────
// 0–900ms    streams shoot inward fast, spiralling tighter
// 900ms      IMPACT — shockwave + debris burst
// 900–1400ms shockwave expands, debris scatters, glow settles
// 1400ms     logo + text reveal
// 1400–2600ms hold
// 2600–3000ms fade out
// 3000ms     navigate

const IMPACT_AT  = 900;
const REVEAL_AT  = 1380;
const EXIT_START = 5400;
const EXIT_DUR   = 600;
const NAV_AT     = 6000;  // minimum display time
const AUTH_URL   = "https://lobby-auth-server.onrender.com";

let t0=null, done=false, revealed=false;
let navTarget = null; // set by auth check: "index.html" or "login.html"

// ── Silent auth check runs immediately ────────────────────────
(async function checkAuth() {
  try {
    const token = localStorage.getItem("vh_token") || sessionStorage.getItem("vh_token");
    if (!token) { navTarget = "login.html"; return; }
    const res = await fetch(`${AUTH_URL}/me`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    navTarget = res.ok ? "index.html" : "login.html";
    if (!res.ok) {
      // Token invalid — clear it
      localStorage.removeItem("vh_token");
      sessionStorage.removeItem("vh_token");
    }
  } catch {
    // Server unreachable — go to login to show error
    navTarget = "login.html";
  }
})();
let lastT = 0;

function frame(ts) {
  if (!t0) t0 = ts;
  const t   = ts - t0;
  const dt  = Math.min(t - lastT, 32); // cap delta
  lastT = t;

  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;

  // Full clear each frame for crisp rendering
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);
  // Motion trail only during stream phase
  if (t < IMPACT_AT + 100) {
    ctx.fillStyle = `rgba(${BGC.r},${BGC.g},${BGC.b},0.55)`;
    ctx.fillRect(0, 0, W, H);
  }

  const tNorm = Math.min(t / IMPACT_AT, 1); // 0→1 during approach

  // ── Draw streams ──────────────────────────────────────────
  if (t < IMPACT_AT + 200) {
    streams.forEach((s, si) => {
      if (s.done) return;

      // Spiral progress: fast in, tightening
      const progress = Math.min(t / IMPACT_AT * s.speed, 1);
      const e = easeOut5(progress);

      // Radius shrinks from startR → 0
      const r = s.startR * (1 - e);
      // Rotations increase as spiral tightens: 2.5 full rotations
      const spin = s.baseAngle + e * Math.PI * 5;

      const x = cx + Math.cos(spin) * r;
      const y = cy + Math.sin(spin) * r;

      s.history.push({x, y});
      if (s.history.length > s.tailLen) s.history.shift();

      if (progress >= 1) {
        s.done = true;
        return;
      }

      if (s.history.length < 2) return;

      // Draw tail: gradient from transparent → bright
      for (let i = 1; i < s.history.length; i++) {
        const pct = i / s.history.length;
        const a = Math.pow(pct, 1.8) * 0.9;
        const w = s.width * pct;

        ctx.beginPath();
        ctx.moveTo(s.history[i-1].x, s.history[i-1].y);
        ctx.lineTo(s.history[i].x,   s.history[i].y);
        ctx.strokeStyle = `rgba(${acS},${a})`;
        ctx.lineWidth   = w * 2.2;
        ctx.lineCap     = 'round';
        ctx.stroke();
      }

      // Bright head
      const headA = 0.95;
      // Core
      ctx.beginPath();
      ctx.arc(x, y, s.width * 1.2, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${headA})`;
      ctx.fill();
      // Bright outer flash
      ctx.beginPath();
      ctx.arc(x, y, s.width * 2.8, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${acS},0.7)`;
      ctx.fill();
      // Glow ring
      const gr = ctx.createRadialGradient(x,y,0, x,y, s.width*12);
      gr.addColorStop(0,   `rgba(${acS},0.85)`);
      gr.addColorStop(0.4, `rgba(${acS},0.15)`);
      gr.addColorStop(1,   'transparent');
      ctx.beginPath();
      ctx.arc(x, y, s.width*12, 0, Math.PI*2);
      ctx.fillStyle = gr;
      ctx.fill();
    });
  }

  // ── Ambient build-up glow ─────────────────────────────────
  if (tNorm > 0.3) {
    const g = (tNorm - 0.3) / 0.7;
    const gr = ctx.createRadialGradient(cx,cy,0, cx,cy, 200);
    gr.addColorStop(0,   `rgba(${acS},${g * 0.25})`);
    gr.addColorStop(0.5, `rgba(${acS},${g * 0.06})`);
    gr.addColorStop(1,   'transparent');
    ctx.fillStyle = gr;
    ctx.fillRect(0,0,W,H);
  }

  // ── Force impact at IMPACT_AT regardless of stream state ──
  if (t >= IMPACT_AT && !impacted) {
    impacted = true;
    spawnDebris(cx, cy);
  }

  // ── Shockwave ring ────────────────────────────────────────
  if (impacted) {
    const elapsed = t - IMPACT_AT;

    // Expand ring fast then slow
    shockwaveR = Math.min(elapsed * 1.4, 360);
    shockwaveAlpha = Math.max(0, 1 - elapsed / 500);

    if (shockwaveAlpha > 0) {
      ctx.beginPath();
      ctx.arc(cx, cy, shockwaveR, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(255,255,255,${shockwaveAlpha * 0.7})`;
      ctx.lineWidth = 2.5 * shockwaveAlpha;
      ctx.stroke();

      // Second wider softer ring
      ctx.beginPath();
      ctx.arc(cx, cy, shockwaveR * 0.7, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(${acS},${shockwaveAlpha * 0.4})`;
      ctx.lineWidth = 8 * shockwaveAlpha;
      ctx.stroke();
    }

    // Impact flash — only in first 120ms
    if (elapsed < 120) {
      const flash = 1 - elapsed / 120;
      const gr = ctx.createRadialGradient(cx,cy,0, cx,cy,200);
      gr.addColorStop(0,   `rgba(255,255,255,${flash * 0.6})`);
      gr.addColorStop(0.3, `rgba(${acS},${flash * 0.4})`);
      gr.addColorStop(1,   'transparent');
      ctx.fillStyle = gr;
      ctx.fillRect(0,0,W,H);
    }

    // Post-impact glow settles
    const glowP = Math.min(elapsed / 600, 1);
    const gr = ctx.createRadialGradient(cx,cy,0, cx,cy,180);
    gr.addColorStop(0,   `rgba(${acS},${0.3 * glowP})`);
    gr.addColorStop(0.5, `rgba(${acS},${0.08 * glowP})`);
    gr.addColorStop(1,   'transparent');
    ctx.fillStyle = gr;
    ctx.fillRect(0,0,W,H);

    // ── Debris ──────────────────────────────────────────────
    const dtSec = dt / 1000;
    debris.forEach(d => {
      if (d.life <= 0) return;
      d.life -= d.decay;
      d.x += d.vx * dtSec;
      d.y += d.vy * dtSec;
      d.vx *= 0.92;
      d.vy *= 0.92;

      const a = Math.max(0, d.life) * 0.85;
      if (d.bright) {
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.size, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.fill();
      }
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.size * (d.bright ? 3 : 2), 0, Math.PI*2);
      ctx.fillStyle = `rgba(${acS},${a * 0.5})`;
      ctx.fill();
    });
  }

  // ── Reveal logo ───────────────────────────────────────────
  if (t >= REVEAL_AT && !revealed) {
    revealed = true;
    document.getElementById("iconBox").classList.add("show");
    document.getElementById("wordWrap").classList.add("show");
  }


  // ❄️ WINTER — snowfall
  drawSnow(t, W, H);

  // ── Exit fade ─────────────────────────────────────────────
  const exitP = Math.max(0, Math.min((t - EXIT_START) / EXIT_DUR, 1));
  if (exitP > 0) {
    ctx.fillStyle = `rgba(${BGC.r},${BGC.g},${BGC.b},${easeInOut(exitP)})`;
    ctx.fillRect(0,0,W,H);
  }

  if (t > NAV_AT && navTarget && !done) {
    done = true;
    if (window.electronAPI?.navigate) window.electronAPI.navigate(navTarget, "fade");
    else window.location.href = navTarget;
    return;
  }

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
