<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tournament Bracket</title>
  <link rel="stylesheet" href="transitions.css" />
  <script src="nav.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-0: #141820; --bg-1: #202630; --bg-2: #2c3440; --bg-3: #384250;
      --accent: #f9a8d4; --accent-h: #f472b6; --danger: #ed4245;
      --green: #23a55a; --yellow: #f0b232;
      --text-1: #fdf2f8; --text-2: #fce7f3; --text-3: #fbcfe8;
      --font: "gg sans","Noto Sans",Whitney,Helvetica Neue,Helvetica,Arial,sans-serif;
    }

    body {
      background: var(--bg-0); color: var(--text-1);
      font-family: var(--font); font-size: 14px;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── HEADER ── */
    .t-header {
      background: linear-gradient(135deg, var(--bg-2), rgba(249,168,212,0.08));
      border-bottom: 2px solid rgba(249,168,212,0.2);
      padding: 16px 24px;
      display: flex; align-items: center; gap: 16px; flex-shrink: 0;
    }
    .t-title { font-size: 22px; font-weight: 800; }
    .t-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 6px; }
    .meta-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; background: rgba(249,168,212,0.1);
      border: 1px solid rgba(249,168,212,0.2); border-radius: 6px;
      font-size: 12px; font-weight: 600; color: var(--text-2);
    }
    .status-badge {
      padding: 4px 10px; border-radius: 6px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
    }
    .status-badge.setup       { background: rgba(240,178,50,.15); color: var(--yellow); border: 1px solid rgba(240,178,50,.3); }
    .status-badge.in-progress { background: rgba(35,165,90,.15);  color: var(--green);  border: 1px solid rgba(35,165,90,.3); }
    .status-badge.completed   { background: rgba(88,101,242,.15); color: #5865f2;       border: 1px solid rgba(88,101,242,.3); }

    .btn {
      padding: 9px 16px; border: none; border-radius: 8px;
      font-weight: 600; cursor: pointer; font-family: var(--font); font-size: 13px;
      display: inline-flex; align-items: center; gap: 6px; transition: all .15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed !important; }
    .btn-back     { background: var(--bg-3); color: var(--text-2); border: 1px solid rgba(255,255,255,.1); }
    .btn-back:hover { background: var(--bg-2); color: var(--text-1); }
    .btn-primary  { background: var(--accent); color: #1a0a10; width: 100%; justify-content: center; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-h); }
    .btn-secondary{ background: var(--bg-3); color: var(--text-2); border: 1px solid rgba(255,255,255,.1); width: 100%; justify-content: center; }
    .btn-secondary:hover:not(:disabled) { background: var(--bg-2); color: var(--text-1); }
    .btn-danger   { background: rgba(237,66,69,.12); color: var(--danger); border: 1px solid rgba(237,66,69,.3); width: 100%; justify-content: center; }
    .btn-danger:hover:not(:disabled) { background: rgba(237,66,69,.22); }
    .btn-green    { background: rgba(35,165,90,.12); color: var(--green); border: 1px solid rgba(35,165,90,.3); width: 100%; justify-content: center; }
    .btn-green:hover:not(:disabled) { background: rgba(35,165,90,.22); }

    /* ── BODY ── */
    .t-body { flex: 1; display: flex; overflow: hidden; min-height: 0; }

    /* ── SIDEBAR ── */
    .t-sidebar {
      width: 260px; min-width: 260px; background: var(--bg-1);
      border-right: 1px solid rgba(255,255,255,.06);
      display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0;
    }
    .sidebar-block { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,.06); }
    .sidebar-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .8px; color: var(--text-3); margin-bottom: 10px;
    }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-card { background: var(--bg-2); border: 1px solid rgba(255,255,255,.06); border-radius: 6px; padding: 10px; text-align: center; }
    .stat-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; font-weight: 600; margin-bottom: 3px; }
    .stat-value { font-size: 14px; font-weight: 800; color: var(--accent); }

    .action-block { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid rgba(255,255,255,.06); }
    .action-hint { font-size: 11px; color: var(--text-3); text-align: center; }

    .player-list { display: flex; flex-direction: column; gap: 6px; }
    .player-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--bg-2); border-radius: 6px; border: 1px solid rgba(255,255,255,.06); }
    .player-avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent-h));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 12px; color: #fff; overflow: hidden;
    }
    .player-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .player-name { font-size: 12px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .host-tag { font-size: 10px; font-weight: 700; color: var(--accent); background: rgba(249,168,212,.12); padding: 2px 5px; border-radius: 4px; flex-shrink: 0; }

    /* ── BRACKET ── */
    .t-bracket-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .bracket-bar {
      padding: 10px 20px; background: var(--bg-1);
      border-bottom: 1px solid rgba(255,255,255,.06);
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: var(--text-3); flex-shrink: 0;
    }
    .bracket-scroll {
      flex: 1; overflow: auto; padding: 32px 48px 32px 32px;
    }
    .bracket-canvas { position: relative; display: inline-block; }

    /* Match card */
    .bm {
      position: absolute;
      width: 190px;
      background: var(--bg-2);
      border: 1.5px solid rgba(255,255,255,.08);
      border-radius: 8px; overflow: hidden;
      transition: border-color .15s;
    }
    .bm:hover { border-color: rgba(249,168,212,.3); }
    .bm-row {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 9px; transition: background .1s;
    }
    .bm-row.winner { background: rgba(35,165,90,.14); }
    .bm-row.winner .bm-name { color: var(--green); font-weight: 700; }
    .bm-row.loser  { opacity: .48; }
    .bm-av {
      width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent-h));
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; font-weight: 800; color: #fff; overflow: hidden;
    }
    .bm-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .bm-name { flex: 1; font-size: 11px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-2); }
    .bm-score {
      font-size: 10px; font-weight: 700; color: var(--text-2);
      background: var(--bg-3); border: 1px solid rgba(255,255,255,.08);
      border-radius: 4px; padding: 2px 6px; min-width: 24px; text-align: center;
    }
    .bm-row.winner .bm-score { background: rgba(35,165,90,.22); color: var(--green); border-color: rgba(35,165,90,.3); }
    .bm-div { height: 1px; background: rgba(255,255,255,.06); }

    /* Round label */
    .round-lbl {
      position: absolute; text-align: center;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .8px; color: var(--text-3);
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 11px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; color: #fff;
      z-index: 9999; pointer-events: none;
      opacity: 0; transform: translateY(12px);
      transition: opacity .25s, transform .25s;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: var(--green); }
    .toast.error   { background: var(--danger); }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(249,168,212,.2); border-radius: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>

<div class="t-header">
  <div style="flex:1">
    <div class="t-title" id="tTitle">Loading…</div>
    <div class="t-meta">
      <div class="meta-badge">👥 <span id="tPlayers">—</span></div>
      <div class="meta-badge">📋 <span id="tFormat">—</span></div>
      <span class="status-badge setup" id="tStatus">—</span>
    </div>
  </div>
  <button class="btn btn-back" onclick="goBack()">← Back</button>
</div>

<div class="t-body">
  <div class="t-sidebar">
    <div class="sidebar-block">
      <div class="sidebar-label">Stats</div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">Format</div><div class="stat-value" id="sFmt">—</div></div>
        <div class="stat-card"><div class="stat-label">Status</div><div class="stat-value" id="sStat">—</div></div>
        <div class="stat-card"><div class="stat-label">Players</div><div class="stat-value" id="sPlayers">0</div></div>
        <div class="stat-card"><div class="stat-label">Slots</div><div class="stat-value" id="sSlots">0</div></div>
      </div>
    </div>
    <div class="action-block" id="actionBlock"></div>
    <div class="sidebar-block" style="flex:1">
      <div class="sidebar-label">Players (<span id="sPC">0</span>)</div>
      <div class="player-list" id="playerList">
        <div style="color:var(--text-3);font-size:12px">Loading…</div>
      </div>
    </div>
  </div>

  <div class="t-bracket-view">
    <div class="bracket-bar">Tournament Bracket</div>
    <div class="bracket-scroll" id="bracketScroll">
      <div class="bracket-canvas" id="bracketCanvas"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const TOURNAMENT_ID = new URLSearchParams(window.location.search).get('id');
  const AUTH_URL = 'https://lobby-auth-server.onrender.com';
  const token = localStorage.getItem('vh_token') || sessionStorage.getItem('vh_token');
  let currentUserId = null;

  if (!token || !TOURNAMENT_ID) window.history.back();

  async function api(path, opts = {}) {
    const r = await fetch(`${AUTH_URL}${path}`, {
      ...opts,
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers||{}) }
    });
    return r.json();
  }

  async function load() {
    try {
      const me = await api('/me');
      currentUserId = me.id;
      const t = await api(`/tournaments/${TOURNAMENT_ID}`);
      if (t.error) throw new Error(t.error);
      render(t);
    } catch(e) {
      console.error(e);
      alert('Failed to load tournament');
      window.history.back();
    }
  }

  function render(t) {
    const fmtMap = { single:'Single Elim', double:'Double Elim', 'round-robin':'Round Robin' };
    const players = t.registeredPlayers || [];
    const isHost = t.hostId === currentUserId;
    const isReg  = players.some(p => p.userId === currentUserId);

    document.getElementById('tTitle').textContent   = t.name || 'Tournament';
    document.getElementById('tPlayers').textContent = `${players.length}/${t.playerCount}`;
    document.getElementById('tFormat').textContent  = fmtMap[t.format] || t.format;
    const sb = document.getElementById('tStatus');
    sb.className = `status-badge ${t.status}`;
    sb.textContent = t.status.replace(/-/g,' ').toUpperCase();

    document.getElementById('sFmt').textContent     = (fmtMap[t.format]||t.format).split(' ')[0];
    document.getElementById('sStat').textContent    = t.status;
    document.getElementById('sPlayers').textContent = players.length;
    document.getElementById('sSlots').textContent   = t.playerCount;
    document.getElementById('sPC').textContent      = players.length;

    renderActions(t, isHost, isReg);
    renderPlayers(t, players);
    renderBracket(t);
  }

  function renderActions(t, isHost, isReg) {
    const el = document.getElementById('actionBlock');
    let html = '';

    if (t.status === 'setup') {
      if (!isReg) {
        html += `<button class="btn btn-primary" onclick="joinTournament()">🎮 Join Tournament</button>`;
      } else if (!isHost) {
        html += `<button class="btn btn-secondary" onclick="leaveTournament()">🚪 Leave Tournament</button>`;
      }
      if (isHost) {
        const canStart = (t.registeredPlayers||[]).length >= 2;
        html += `<button class="btn btn-green" onclick="startTournament()" ${canStart?'':'disabled'}>▶ Start Tournament</button>`;
        if (!canStart) html += `<div class="action-hint">Need at least 2 players to start</div>`;
      }
    }

    if (t.status === 'in-progress' && isHost) {
      html += `<button class="btn btn-danger" onclick="endTournament()">⏹ End Tournament</button>`;
    }

    if (t.status === 'completed') {
      html += `<div class="action-hint" style="padding:8px 0;font-size:13px">🏆 Tournament Complete</div>`;
    }

    el.innerHTML = html;
    el.style.display = html ? 'flex' : 'none';
  }

  function renderPlayers(t, players) {
    const el = document.getElementById('playerList');
    if (!players.length) {
      el.innerHTML = '<div style="color:var(--text-3);font-size:12px">No players yet</div>';
      return;
    }
    el.innerHTML = players.map(p => {
      const av = p.avatar_url ? `<img src="${p.avatar_url}">` : (p.username||'?')[0].toUpperCase();
      const host = p.userId === t.hostId ? '<span class="host-tag">HOST</span>' : '';
      return `<div class="player-item"><div class="player-avatar">${av}</div><div class="player-name">${p.username||'Unknown'}</div>${host}</div>`;
    }).join('');
  }

  /* ───── BRACKET RENDERER ───── */
  const MATCH_W = 190;
  const MATCH_H = 62;   // approx height of match card
  const COL_GAP = 52;   // horizontal gap between rounds (connector space)
  const V_PAD   = 36;   // top padding for round label

  function buildSkeleton(playerCount) {
    const slots = Math.pow(2, Math.ceil(Math.log2(Math.max(playerCount||2, 2))));
    const numRounds = Math.log2(slots);
    const rounds = [];
    for (let r = 1; r <= numRounds; r++) {
      const mc = slots / Math.pow(2, r);
      rounds.push({ roundNumber: r, matches: Array.from({length: mc}, (_,i) => ({ matchNumber: i+1, player1: null, player2: null, winner: null, player1Score: null, player2Score: null })) });
    }
    return rounds;
  }

  function renderBracket(t) {
    // Apply background
    const bgData = JSON.parse(localStorage.getItem('vh_tournament_bracket_bg_data')||'{}');
    const scroll = document.getElementById('bracketScroll');
    if (bgData.imageUrl) { scroll.style.backgroundImage=`url(${bgData.imageUrl})`; scroll.style.backgroundSize='cover'; scroll.style.backgroundPosition='center'; }
    else if (bgData.colour) { scroll.style.backgroundImage='none'; scroll.style.backgroundColor=bgData.colour; }

    const skeleton = buildSkeleton(t.playerCount||2);
    const rounds = skeleton.map(sr => {
      const real = (t.bracket?.rounds||[]).find(r => r.roundNumber === sr.roundNumber);
      return real || sr;
    });

    const numRounds = rounds.length;
    if (!numRounds) return;

    const firstCount = rounds[0].matches.length;
    // Vertical spacing for first round
    const vSpacing = MATCH_H + 16;
    const totalH = firstCount * vSpacing - 16;
    const totalW = numRounds * MATCH_W + (numRounds - 1) * COL_GAP;

    const canvas = document.getElementById('bracketCanvas');
    canvas.style.width  = (totalW + 40) + 'px';
    canvas.style.height = (totalH + V_PAD + 20) + 'px';

    let html = '';

    // SVG layer for connectors
    html += `<svg style="position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;overflow:visible" xmlns="http://www.w3.org/2000/svg" id="connSvg"></svg>`;

    const matchPositions = {}; // key: "r-m" => {cx, cy}

    rounds.forEach((round, rIdx) => {
      const matchCount = round.matches.length;
      const x = rIdx * (MATCH_W + COL_GAP);

      // For this round, each match occupies a vertical "slot"
      // The slot height scales up by 2x each round
      const slotH = (totalH) / matchCount;

      // Round label
      const lbl = getRoundName(round.roundNumber, numRounds);
      html += `<div class="round-lbl" style="left:${x}px;top:0;width:${MATCH_W}px">${lbl}</div>`;

      round.matches.forEach((match, mIdx) => {
        const cy = V_PAD + slotH * mIdx + slotH / 2 - MATCH_H / 2;
        const key = `${rIdx}-${mIdx}`;
        matchPositions[key] = { x, cy, cx: x + MATCH_W, midY: cy + MATCH_H / 2 };

        const p1 = match.player1, p2 = match.player2;
        const p1w = match.winner && match.winner === p1?.userId;
        const p2w = match.winner && match.winner === p2?.userId;
        const p1av = p1?.avatar_url ? `<img src="${p1.avatar_url}">` : (p1 ? (p1.username||'?')[0].toUpperCase() : '?');
        const p2av = p2?.avatar_url ? `<img src="${p2.avatar_url}">` : (p2 ? (p2.username||'?')[0].toUpperCase() : '?');

        html += `
          <div class="bm" style="left:${x}px;top:${cy}px">
            <div class="bm-row ${p1w?'winner':p2w?'loser':''}">
              <div class="bm-av">${p1av}</div>
              <span class="bm-name">${p1?.username||'TBD'}</span>
              <span class="bm-score">${match.player1Score!=null?match.player1Score:'-'}</span>
            </div>
            <div class="bm-div"></div>
            <div class="bm-row ${p2w?'winner':p1w?'loser':''}">
              <div class="bm-av">${p2av}</div>
              <span class="bm-name">${p2?.username||'TBD'}</span>
              <span class="bm-score">${match.player2Score!=null?match.player2Score:'-'}</span>
            </div>
          </div>`;
      });
    });

    // Trophy
    const lastRound = rounds[numRounds - 1];
    if (lastRound?.matches?.length === 1) {
      const tx = numRounds * (MATCH_W + COL_GAP) - COL_GAP + 8;
      const ty = V_PAD + totalH / 2 - 20;
      html += `<div style="position:absolute;left:${tx}px;top:${ty}px;font-size:32px;opacity:.35;pointer-events:none">🏆</div>`;
    }

    canvas.innerHTML = html;

    // Draw connectors via SVG after DOM is set
    requestAnimationFrame(() => {
      const svgEl = canvas.querySelector('#connSvg');
      if (!svgEl) return;
      let paths = '';

      rounds.forEach((round, rIdx) => {
        if (rIdx >= numRounds - 1) return;
        const matchCount = round.matches.length;
        const slotH = totalH / matchCount;
        const nextSlotH = totalH / (matchCount / 2);
        const nextX = (rIdx + 1) * (MATCH_W + COL_GAP);

        round.matches.forEach((_, mIdx) => {
          const y1 = V_PAD + slotH * mIdx + slotH / 2;
          const nextMIdx = Math.floor(mIdx / 2);
          const y2 = V_PAD + nextSlotH * nextMIdx + nextSlotH / 2;
          const x1 = rIdx * (MATCH_W + COL_GAP) + MATCH_W;
          const x2 = nextX;
          const mx = x1 + COL_GAP / 2;

          paths += `<path d="M${x1},${y1} H${mx} V${y2} H${x2}" fill="none" stroke="rgba(249,168,212,0.22)" stroke-width="1.5" stroke-linecap="round"/>`;
        });
      });

      svgEl.innerHTML = paths;
    });
  }

  function getRoundName(r, total) {
    const rem = total - r + 1;
    if (rem === 1) return 'Final';
    if (rem === 2) return 'Semi-Final';
    if (rem === 3) return 'Quarter-Final';
    return `Round ${r}`;
  }

  /* ── ACTIONS ── */
  async function joinTournament() {
    try {
      const r = await api(`/tournaments/${TOURNAMENT_ID}/register`, { method:'POST' });
      if (r.error) throw new Error(r.error);
      showToast('Joined tournament! 🎮', 'success');
      load();
    } catch(e) { showToast(e.message||'Failed to join', 'error'); }
  }

  async function leaveTournament() {
    if (!confirm('Leave this tournament?')) return;
    try {
      const r = await api(`/tournaments/${TOURNAMENT_ID}/leave`, { method:'POST' });
      if (r.error) throw new Error(r.error);
      showToast('Left tournament', 'success');
      load();
    } catch(e) { showToast(e.message||'Failed to leave', 'error'); }
  }

  async function startTournament() {
    if (!confirm('Start tournament and generate bracket? Players cannot join after this.')) return;
    try {
      const r = await api(`/tournaments/${TOURNAMENT_ID}/generate-bracket`, { method:'POST' });
      if (r.error) throw new Error(r.error);
      showToast('Tournament started! ▶', 'success');
      load();
    } catch(e) { showToast(e.message||'Failed to start', 'error'); }
  }

  async function endTournament() {
    if (!confirm('End this tournament? This cannot be undone.')) return;
    try {
      const r = await api(`/tournaments/${TOURNAMENT_ID}/close`, { method:'POST' });
      if (r.error) throw new Error(r.error);
      showToast('Tournament ended 🏁', 'success');
      load();
    } catch(e) { showToast(e.message||'Failed to end', 'error'); }
  }

  function showToast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    setTimeout(() => el.className = `toast ${type}`, 3200);
  }

  function goBack() { window.history.back(); }
  load();
</script>
</body>
</html>
