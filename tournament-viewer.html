<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tournament Bracket</title>
  <link rel="stylesheet" href="transitions.css" />
  <script src="nav.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg-0: #141820;
      --bg-1: #202630;
      --bg-2: #2c3440;
      --bg-3: #384250;
      --accent: #f9a8d4;
      --accent-h: #f472b6;
      --danger: #ed4245;
      --green: #23a55a;
      --yellow: #f0b232;
      --text-1: #fdf2f8;
      --text-2: #fce7f3;
      --text-3: #fbcfe8;
      --radius: 8px;
      --font: "gg sans", "Noto Sans", Whitney, Helvetica Neue, Helvetica, Arial, sans-serif;
    }

    body {
      background: var(--bg-0);
      color: var(--text-1);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ════════ HEADER ════════ */
    .tournament-header {
      background: linear-gradient(135deg, var(--bg-2) 0%, rgba(249, 168, 212, 0.08) 100%);
      border-bottom: 2px solid rgba(249, 168, 212, 0.2);
      padding: 24px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
    }

    .tournament-info {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .tournament-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .tournament-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .meta-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(249, 168, 212, 0.1);
      border: 1px solid rgba(249, 168, 212, 0.2);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
    }

    .status-badge {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-badge.in-progress {
      background: rgba(35, 165, 90, 0.15);
      color: var(--green);
      border: 1px solid rgba(35, 165, 90, 0.3);
    }

    .status-badge.registration {
      background: rgba(240, 178, 50, 0.15);
      color: var(--yellow);
      border: 1px solid rgba(240, 178, 50, 0.3);
    }

    .status-badge.completed {
      background: rgba(88, 101, 242, 0.15);
      color: #5865f2;
      border: 1px solid rgba(88, 101, 242, 0.3);
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-h);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: var(--bg-3);
      color: var(--text-2);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-1);
    }

    /* ════════ MAIN CONTENT ════════ */
    .tournament-content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .tournament-sidebar {
      width: 280px;
      background: var(--bg-1);
      border-right: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-section {
      padding: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .sidebar-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-3);
      margin-bottom: 12px;
    }

    .player-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .player-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: var(--bg-2);
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: all 0.15s;
    }

    .player-item:hover {
      background: var(--bg-3);
      border-color: rgba(249, 168, 212, 0.2);
    }

    .player-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-h));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 12px;
      flex-shrink: 0;
    }

    .player-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-card {
      background: var(--bg-2);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      padding: 12px;
      text-align: center;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-3);
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
    }

    /* ════════ BRACKET VIEW ════════ */
    .bracket-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .bracket-header {
      padding: 16px 24px;
      background: var(--bg-1);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .bracket-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-1);
    }

    .bracket-scroll {
      flex: 1;
      overflow-x: auto;
      overflow-y: auto;
      padding: 24px;
      background: linear-gradient(135deg, var(--bg-0) 0%, rgba(249, 168, 212, 0.03) 100%);
    }

    .bracket {
      display: flex;
      gap: 40px;
      min-width: min-content;
    }

    .bracket-round {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
    }

    .round-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-3);
      text-align: center;
      height: 32px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      margin-bottom: 8px;
    }

    .round-matches {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .bracket-match {
      width: 200px;
      background: linear-gradient(135deg, var(--bg-2) 0%, rgba(249, 168, 212, 0.06) 100%);
      border: 2px solid rgba(249, 168, 212, 0.15);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .bracket-match:hover {
      border-color: rgba(249, 168, 212, 0.4);
      box-shadow: 0 8px 24px rgba(249, 168, 212, 0.15);
      transform: translateY(-2px);
    }

    .match-player {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      font-size: 12px;
    }

    .match-player.winner {
      background: rgba(35, 165, 90, 0.15);
      border-left: 2px solid var(--green);
      padding-left: 6px;
    }

    .match-player {
      display: flex;
      align-items: center;
      padding: 8px;
      gap: 6px;
    }

    .match-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-h));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      overflow: hidden;
    }

    .match-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .player-name-match {
      flex: 1;
      font-weight: 500;
      color: var(--text-1);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .player-score {
      background: var(--bg-3);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 3px 8px;
      border-radius: 3px;
      width: 40px;
      text-align: center;
      color: var(--text-1);
      font-weight: 600;
      font-size: 11px;
    }

    .match-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
    }

    /* ════════ EMPTY STATE ════════ */
    .bracket-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: var(--text-3);
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.6;
    }

    .empty-text {
      font-size: 16px;
      text-align: center;
    }

    /* ════════ SCROLLBAR ════════ */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(249, 168, 212, 0.2);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(249, 168, 212, 0.3);
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    /* ════════ RESPONSIVE ════════ */
    @media (max-width: 1024px) {
      .tournament-sidebar {
        width: 240px;
      }

      .bracket-match {
        width: 180px;
      }

      .bracket {
        gap: 30px;
      }
    }

    @media (max-width: 768px) {
      .tournament-header {
        flex-direction: column;
        gap: 16px;
        align-items: flex-start;
      }

      .tournament-content {
        flex-direction: column;
      }

      .tournament-sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        max-height: 200px;
      }

      .bracket-match {
        width: 160px;
      }

      .bracket {
        gap: 20px;
      }

      .header-actions {
        align-self: flex-end;
      }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="tournament-header">
  <div class="tournament-info">
    <div class="tournament-title" id="tournamentTitle">Tournament Name</div>
    <div class="tournament-meta">
      <div class="meta-badge">
        <span>📊</span>
        <span id="playerCount">0/0</span> Players
      </div>
      <div class="meta-badge">
        <span>📋</span>
        <span id="formatLabel">Single Elimination</span>
      </div>
      <div class="status-badge in-progress" id="statusBadge">In Progress</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-secondary" onclick="goBack()">← Back</button>
  </div>
</div>

<!-- CONTENT -->
<div class="tournament-content">
  <!-- SIDEBAR -->
  <div class="tournament-sidebar">
    <!-- Tournament Stats -->
    <div class="sidebar-section">
      <div class="sidebar-title">Statistics</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Format</div>
          <div class="stat-value" id="formatStat">Single</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Status</div>
          <div class="stat-value" id="statusStat">Active</div>
        </div>
      </div>
    </div>

    <!-- Registered Players -->
    <div class="sidebar-section">
      <div class="sidebar-title">Registered Players</div>
      <div class="player-list" id="playerList">
        <div style="color: var(--text-3); font-size: 12px;">Loading...</div>
      </div>
    </div>
  </div>

  <!-- BRACKET VIEW -->
  <div class="bracket-view">
    <div class="bracket-header">
      <div class="bracket-title">Tournament Bracket</div>
    </div>
    <div class="bracket-scroll">
      <div id="bracketContainer" style="display: flex; width: 100%; height: 100%; align-items: center; justify-content: center;">
        <div class="bracket-empty">
          <div class="empty-icon">🏆</div>
          <div class="empty-text">Bracket will appear here</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const TOURNAMENT_ID = new URLSearchParams(window.location.search).get('id');
  const AUTH_URL = "https://lobby-auth-server.onrender.com";
  const token = localStorage.getItem("vh_token") || sessionStorage.getItem("vh_token");

  if (!token || !TOURNAMENT_ID) {
    window.history.back();
  }

  async function api(path, opts = {}) {
    return fetch(`${AUTH_URL}${path}`, {
      ...opts,
      headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json", ...(opts.headers || {}) }
    }).then(r => r.json());
  }

  async function loadTournament() {
    try {
      const tournament = await api(`/tournaments/${TOURNAMENT_ID}`);
      if (tournament.error) throw new Error(tournament.error);
      
      renderTournament(tournament);
    } catch (error) {
      console.error('Error loading tournament:', error);
      alert('Failed to load tournament');
      window.history.back();
    }
  }

  function renderTournament(t) {
    // Header
    document.getElementById('tournamentTitle').textContent = t.name || 'Tournament';
    document.getElementById('playerCount').textContent = `${(t.registeredPlayers || []).length}/${t.playerCount}`;
    
    const formatLabels = {
      'single': 'Single Elimination',
      'double': 'Double Elimination',
      'round-robin': 'Round Robin'
    };
    document.getElementById('formatLabel').textContent = formatLabels[t.format] || t.format;
    
    // Status badge
    const badgeEl = document.getElementById('statusBadge');
    badgeEl.className = `status-badge ${t.status}`;
    badgeEl.textContent = t.status.replace('-', ' ').toUpperCase();
    
    // Sidebar stats
    document.getElementById('formatStat').textContent = (formatLabels[t.format] || t.format).split(' ')[0];
    document.getElementById('statusStat').textContent = t.status.replace('-', ' ');
    
    // Players list — use avatar_url directly from tournament data
    const playerList = document.getElementById('playerList');
    const players = t.registeredPlayers || [];
    if (players.length === 0) {
      playerList.innerHTML = '<div style="color: var(--text-3); font-size: 12px;">No players yet</div>';
    } else {
      playerList.innerHTML = players.map(p => {
        const av = p.avatar_url ? `<img src="${p.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : (p.username||'?').slice(0,1).toUpperCase();
        return `<div class="player-item">
          <div class="player-avatar" style="overflow:hidden;">${av}</div>
          <div class="player-name">${p.username || 'Unknown'}</div>
        </div>`;
      }).join('');
    }
    
    // Bracket
    renderBracket(t);
  }

  function renderBracket(t) {
    const container = document.getElementById('bracketContainer');
    const players = t.registeredPlayers || [];
    const bracket = t.bracket || { rounds: [] };
    const playerCount = t.playerCount || 2;

    // Build full skeleton of expected rounds even if no bracket data yet
    let rounds = (bracket.rounds && bracket.rounds.length > 0)
      ? bracket.rounds
      : buildEmptyBracket(playerCount, t.format);

    // Apply tournament bracket background if set
    const bracketBg = localStorage.getItem('vh_tournament_bracket_bg');
    const bracketBgColour = localStorage.getItem('vh_tournament_bracket_bg_colour');
    const bracketScroll = document.querySelector('.bracket-scroll');
    if (bracketScroll) {
      if (bracketBg) {
        bracketScroll.style.backgroundImage = `url(${bracketBg})`;
        bracketScroll.style.backgroundSize = 'cover';
        bracketScroll.style.backgroundPosition = 'center';
        bracketScroll.style.backgroundColor = 'transparent';
      } else if (bracketBgColour) {
        bracketScroll.style.backgroundImage = 'none';
        bracketScroll.style.backgroundColor = bracketBgColour;
      }
    }

    container.style.alignItems = 'flex-start';
    container.style.justifyContent = 'flex-start';

    container.innerHTML = `
      <div class="bracket">
        ${rounds.map(round => `
          <div class="bracket-round">
            <div class="round-title">Round ${round.roundNumber}</div>
            <div class="round-matches">
              ${(round.matches || []).map(match => {
                const p1 = match.player1;
                const p2 = match.player2;
                const p1w = match.winner && match.winner === p1?.userId;
                const p2w = match.winner && match.winner === p2?.userId;
                const p1av = p1?.avatar_url ? `<img src="${p1.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : (p1 ? (p1.username||'?')[0].toUpperCase() : '?');
                const p2av = p2?.avatar_url ? `<img src="${p2.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : (p2 ? (p2.username||'?')[0].toUpperCase() : '?');
                return `
                  <div class="bracket-match">
                    <div class="match-player ${p1w ? 'winner' : ''}">
                      <div class="match-avatar">${p1av}</div>
                      <span class="player-name-match">${p1?.username || 'TBD'}</span>
                      <span class="player-score">${match.player1Score != null ? match.player1Score : (p1 ? 0 : '-')}</span>
                    </div>
                    <div class="match-divider"></div>
                    <div class="match-player ${p2w ? 'winner' : ''}">
                      <div class="match-avatar">${p2av}</div>
                      <span class="player-name-match">${p2?.username || 'TBD'}</span>
                      <span class="player-score">${match.player2Score != null ? match.player2Score : (p2 ? 0 : '-')}</span>
                    </div>
                  </div>`;
              }).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }

  // Build an empty bracket skeleton based on player count
  function buildEmptyBracket(playerCount, format) {
    const slots = Math.pow(2, Math.ceil(Math.log2(Math.max(playerCount, 2))));
    const numRounds = Math.log2(slots);
    const rounds = [];
    for (let r = 1; r <= numRounds; r++) {
      const matchCount = slots / Math.pow(2, r);
      const matches = [];
      for (let m = 1; m <= matchCount; m++) {
        matches.push({ matchNumber: m, player1: null, player2: null, winner: null, player1Score: null, player2Score: null });
      }
      rounds.push({ roundNumber: r, matches });
    }
    return rounds;
  }

  function goBack() {
    window.history.back();
  }

  // Load on page load
  loadTournament();
</script>

</body>
</html>
