<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOBBY - Gaming Social Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-primary: #1e1f22;
      --bg-secondary: #2b2d31;
      --bg-tertiary: #313338;
      --accent: #5865f2;
      --text-primary: #f2f3f5;
      --text-secondary: #b5bac1;
      --success: #23a55a;
      --danger: #ed4245;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    .sidebar {
      width: 280px;
      background: var(--bg-secondary);
      border-right: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      padding: 16px;
    }

    .sidebar-header {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-item {
      padding: 10px 12px;
      margin-bottom: 4px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      color: var(--text-secondary);
    }

    .nav-item:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .nav-item.active {
      background: var(--accent);
      color: white;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: none;
    }

    .panel.active {
      display: block;
    }

    /* ── Profile Panel ── */
    .profile-header {
      margin-bottom: 24px;
    }

    .banner-section {
      position: relative;
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #5865f2 0%, #4752c4 100%);
      border-radius: 12px;
      margin-bottom: 16px;
      cursor: pointer;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      transition: opacity 0.2s;
    }

    .banner-section img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .banner-section:hover {
      opacity: 0.85;
    }

    .banner-input, .avatar-input, .steam-connect {
      display: none;
    }

    .profile-card {
      background: var(--bg-tertiary);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      min-width: 120px;
    }

    .avatar-img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 700;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .avatar-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-img:hover {
      transform: scale(1.05);
    }

    .profile-info {
      flex: 1;
    }

    .username {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .user-id {
      color: var(--text-secondary);
      font-size: 13px;
      margin-bottom: 12px;
    }

    .user-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
    }

    .profile-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: #4752c4;
    }

    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.05);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: #d83c3e;
    }

    .steam-info {
      background: var(--bg-secondary);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
    }

    .steam-label {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .steam-games {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .game-card {
      background: var(--bg-tertiary);
      border-radius: 6px;
      padding: 12px;
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .feed-item {
      background: var(--bg-tertiary);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .feed-item-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .feed-item-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 12px;
      flex-shrink: 0;
    }

    .feed-item-meta {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .feed-item-content {
      margin-top: 8px;
      line-height: 1.4;
    }

    .loading {
      text-align: center;
      color: var(--text-secondary);
      padding: 20px;
    }

    .error {
      background: rgba(237, 66, 69, 0.1);
      border: 1px solid var(--danger);
      border-radius: 8px;
      padding: 12px;
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 16px;
    }

    .logout-btn {
      background: var(--danger);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.15s;
    }

    .logout-btn:hover {
      background: #d83c3e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <div class="sidebar-header">🎮 LOBBY</div>
      <nav>
        <div class="nav-item active" onclick="switchPanel('profile')">Profile</div>
        <div class="nav-item" onclick="switchPanel('feed')">Feed</div>
        <div class="nav-item" onclick="switchPanel('friends')">Friends</div>
        <div class="nav-item" onclick="switchPanel('servers')">Servers</div>
      </nav>
      <div style="margin-top: auto; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.05);">
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="main-content">
      <div class="header">
        <h1 id="panel-title">Profile</h1>
        <div id="header-actions"></div>
      </div>

      <!-- ── Profile Panel ── -->
      <div id="profile" class="panel active">
        <div id="profile-error" style="display: none;"></div>
        <div id="profile-loading" class="loading">Loading profile...</div>
        <div id="profile-content" style="display: none;">
          <!-- Banner -->
          <div class="banner-section" onclick="document.querySelector('.banner-input').click()" title="Click to change banner">
            <img id="banner-img" style="display: none;">
            <span id="banner-placeholder">Click to change banner</span>
          </div>
          <input type="file" class="banner-input" accept="image/*" onchange="uploadBanner(event)">

          <!-- Profile Card -->
          <div class="profile-card">
            <div class="avatar-section">
              <div class="avatar-img" onclick="document.querySelector('.avatar-input').click()">
                <img id="avatar-img" style="display: none;">
                <span id="avatar-placeholder">?</span>
              </div>
              <input type="file" class="avatar-input" accept="image/*" onchange="uploadAvatar(event)">
            </div>

            <div class="profile-info">
              <div class="username" id="profile-username">Loading...</div>
              <div class="user-id" id="profile-userid">ID: -</div>
              
              <div class="user-status">
                <div class="status-indicator"></div>
                <span>Online</span>
              </div>

              <div class="profile-buttons">
                <button class="btn btn-primary" onclick="editProfile()">Edit Profile</button>
                <button class="btn btn-secondary" onclick="viewFriends()">Friends</button>
              </div>

              <!-- Steam Section -->
              <div class="steam-info">
                <div class="steam-label">Steam Profile</div>
                <button class="btn btn-secondary" onclick="linkSteam()" id="steam-connect-btn">
                  Connect Steam
                </button>
                <div id="steam-games-container" style="display: none;">
                  <div class="steam-label" style="margin-top: 12px;">Recent Games</div>
                  <div class="steam-games" id="steam-games"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ── Feed Panel ── -->
      <div id="feed" class="panel">
        <div id="feed-loading" class="loading">Loading feed...</div>
        <div id="feed-content" style="display: none;"></div>
      </div>

      <!-- ── Friends Panel ── -->
      <div id="friends" class="panel">
        <div id="friends-loading" class="loading">Loading friends...</div>
        <div id="friends-content" style="display: none;"></div>
      </div>

      <!-- ── Servers Panel ── -->
      <div id="servers" class="panel">
        <div id="servers-loading" class="loading">Loading servers...</div>
        <div id="servers-content" style="display: none;">
          <button class="btn btn-primary" onclick="createServer()" style="margin-bottom: 16px; width: 100%;">+ Create Server</button>
          <div id="servers-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── Configuration ──
    const API_BASE = 'https://lobby-auth-server.onrender.com/auth';
    const WS_URL = 'wss://lobby-websocket-server.onrender.com';

    let currentUser = null;
    let authToken = null;

    // ── Auth & Token ──
    function getToken() {
      return localStorage.getItem('token');
    }

    function setToken(token) {
      localStorage.setItem('token', token);
      authToken = token;
    }

    function getUserId() {
      return localStorage.getItem('userId');
    }

    function setUserId(id) {
      localStorage.setItem('userId', id);
    }

    // ── API Calls ──
    async function apiCall(endpoint, options = {}) {
      const headers = {
        'Content-Type': 'application/json',
        ...options.headers
      };

      const token = getToken();
      if (token) {
        headers['Authorization'] = `Bearer ${token}`;
      }

      try {
        const response = await fetch(`${API_BASE}${endpoint}`, {
          ...options,
          headers
        });

        if (response.status === 401) {
          logout();
          return null;
        }

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.message || `API Error: ${response.status}`);
        }
        return data;
      } catch (err) {
        console.error('API Error:', err);
        throw err;
      }
    }

    async function uploadFile(endpoint, file) {
      const formData = new FormData();
      formData.append('file', file);

      const token = getToken();
      const headers = {};
      if (token) {
        headers['Authorization'] = `Bearer ${token}`;
      }

      try {
        const response = await fetch(`${API_BASE}${endpoint}`, {
          method: 'POST',
          headers,
          body: formData
        });

        if (response.status === 401) {
          logout();
          return null;
        }

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.message || `Upload Error: ${response.status}`);
        }
        return data;
      } catch (err) {
        console.error('Upload Error:', err);
        throw err;
      }
    }

    // ── UI Functions ──
    function switchPanel(panelName) {
      // Hide all panels
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

      // Show selected panel
      document.getElementById(panelName).classList.add('active');
      event.target.classList.add('active');

      // Update title
      const titles = { profile: 'Profile', feed: 'Feed', friends: 'Friends', servers: 'Servers' };
      document.getElementById('panel-title').textContent = titles[panelName] || panelName;

      // Load content
      if (panelName === 'profile') loadProfile();
      else if (panelName === 'feed') loadFeed();
      else if (panelName === 'friends') loadFriends();
      else if (panelName === 'servers') loadServers();
    }

    async function loadProfile() {
      const userId = getUserId();
      if (!userId) {
        window.location.href = 'login.html';
        return;
      }

      try {
        const data = await apiCall(`/profile/${userId}`);
        if (!data) return;

        currentUser = data;

        // Update profile display
        document.getElementById('profile-loading').style.display = 'none';
        document.getElementById('profile-content').style.display = 'block';

        document.getElementById('profile-username').textContent = data.username || 'Unknown User';
        document.getElementById('profile-userid').textContent = `ID: ${data.id}`;

        if (data.avatar) {
          document.getElementById('avatar-img').src = data.avatar;
          document.getElementById('avatar-img').style.display = 'block';
          document.getElementById('avatar-placeholder').style.display = 'none';
        }

        if (data.banner) {
          document.getElementById('banner-img').src = data.banner;
          document.getElementById('banner-img').style.display = 'block';
          document.getElementById('banner-placeholder').style.display = 'none';
        }

        // Load Steam games if linked
        if (data.steam_id) {
          loadSteamGames();
        }
      } catch (err) {
        document.getElementById('profile-loading').style.display = 'none';
        document.getElementById('profile-error').style.display = 'block';
        document.getElementById('profile-error').classList.add('error');
        document.getElementById('profile-error').textContent = `Error: ${err.message}`;
      }
    }

    async function uploadAvatar(event) {
      const file = event.target.files[0];
      if (!file) return;

      try {
        const result = await uploadFile('/avatar', file);
        if (result && result.avatar_url) {
          document.getElementById('avatar-img').src = result.avatar_url;
          document.getElementById('avatar-img').style.display = 'block';
          document.getElementById('avatar-placeholder').style.display = 'none';
          alert('Avatar updated!');
        }
      } catch (err) {
        alert(`Upload failed: ${err.message}`);
      }
    }

    async function uploadBanner(event) {
      const file = event.target.files[0];
      if (!file) return;

      try {
        const result = await uploadFile('/banner', file);
        if (result && result.banner_url) {
          document.getElementById('banner-img').src = result.banner_url;
          document.getElementById('banner-img').style.display = 'block';
          document.getElementById('banner-placeholder').style.display = 'none';
          alert('Banner updated!');
        }
      } catch (err) {
        alert(`Upload failed: ${err.message}`);
      }
    }

    async function linkSteam() {
      try {
        const result = await apiCall('/steam/recent', { method: 'POST' });
        if (result) {
          alert('Steam profile linked! Loading your games...');
          await loadSteamGames();
        }
      } catch (err) {
        alert(`Failed to link Steam: ${err.message}`);
      }
    }

    async function loadSteamGames() {
      try {
        const data = await apiCall('/steam/recent');
        if (data && data.games && data.games.length > 0) {
          const container = document.getElementById('steam-games-container');
          const gamesList = document.getElementById('steam-games');
          container.style.display = 'block';
          gamesList.innerHTML = data.games.map(game => 
            `<div class="game-card">${game.name}</div>`
          ).join('');
          document.getElementById('steam-connect-btn').textContent = 'Steam Connected ✓';
          document.getElementById('steam-connect-btn').disabled = true;
        }
      } catch (err) {
        console.log('Steam games not available:', err.message);
      }
    }

    async function loadFeed() {
      try {
        const data = await apiCall('/feed');
        if (!data) return;

        document.getElementById('feed-loading').style.display = 'none';
        document.getElementById('feed-content').style.display = 'block';

        const posts = data.posts || [];
        if (posts.length === 0) {
          document.getElementById('feed-content').innerHTML = '<div class="loading">No posts yet</div>';
          return;
        }

        document.getElementById('feed-content').innerHTML = posts.map(post => `
          <div class="feed-item">
            <div class="feed-item-header">
              <div class="feed-item-avatar">${post.author?.charAt(0) || '?'}</div>
              <div>
                <div style="font-weight: 600;">${post.author || 'Anonymous'}</div>
                <div class="feed-item-meta">${new Date(post.created_at).toLocaleDateString()}</div>
              </div>
            </div>
            <div class="feed-item-content">${post.content}</div>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('feed-loading').style.display = 'none';
        document.getElementById('feed-content').innerHTML = `<div class="error">Error: ${err.message}</div>`;
      }
    }

    async function loadFriends() {
      const userId = getUserId();
      try {
        const data = await apiCall(`/profile/${userId}/friends`);
        if (!data) return;

        document.getElementById('friends-loading').style.display = 'none';
        document.getElementById('friends-content').style.display = 'block';

        const friends = data.friends || [];
        if (friends.length === 0) {
          document.getElementById('friends-content').innerHTML = '<div class="loading">No friends yet</div>';
          return;
        }

        document.getElementById('friends-content').innerHTML = friends.map(friend => `
          <div class="feed-item">
            <div class="feed-item-header">
              <div class="feed-item-avatar">${friend.username?.charAt(0) || '?'}</div>
              <div style="flex: 1;">
                <div style="font-weight: 600;">${friend.username}</div>
              </div>
            </div>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('friends-loading').style.display = 'none';
        document.getElementById('friends-content').innerHTML = `<div class="error">Error: ${err.message}</div>`;
      }
    }

    async function loadServers() {
      try {
        const data = await apiCall('/servers');
        if (!data) return;

        document.getElementById('servers-loading').style.display = 'none';
        document.getElementById('servers-content').style.display = 'block';

        const servers = data.servers || [];
        if (servers.length === 0) {
          document.getElementById('servers-list').innerHTML = '<div class="loading">No servers available</div>';
          return;
        }

        document.getElementById('servers-list').innerHTML = servers.map(server => `
          <div class="feed-item">
            <div style="font-weight: 600; font-size: 16px; margin-bottom: 4px;">${server.name}</div>
            <div class="feed-item-meta">${server.description || 'No description'}</div>
            <div style="margin-top: 8px; font-size: 12px; color: var(--text-secondary);">
              👥 ${server.member_count || 0} members
            </div>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('servers-loading').style.display = 'none';
        document.getElementById('servers-list').innerHTML = `<div class="error">Error: ${err.message}</div>`;
      }
    }

    function createServer() {
      alert('Server creation coming soon!');\n    }

    function editProfile() {
      alert('Profile editing coming soon!');
    }

    function viewFriends() {
      switchPanel('friends');
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('userId');
      window.location.href = 'login.html';
    }

    // ── Check Auth & Initialize ──
    window.addEventListener('load', () => {
      const token = getToken();
      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      loadProfile();
    });
  </script>
</body>
</html>
