<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="transitions.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoiceHub — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-0: #1e1f22;
      --bg-1: #2b2d31;
      --bg-2: #313338;
      --bg-3: #383a40;
      --accent: #5865f2;
      --accent-h: #4752c4;
      --danger: #ed4245;
      --green: #23a55a;
      --text-1: #f2f3f5;
      --text-2: #b5bac1;
      --text-3: #80848e;
      --radius: 8px;
      --font: "gg sans", "Noto Sans", Whitney, Helvetica Neue, Helvetica, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-0);
      font-family: var(--font);
      color: var(--text-1);
    }

    /* Subtle background pattern */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(88,101,242,.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(35,165,90,.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .card {
      background: var(--bg-1);
      border-radius: 16px;
      padding: 40px 40px 32px;
      width: min(480px, 92vw);
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
      position: relative;
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo-icon {
      font-size: 48px;
      line-height: 1;
    }

    .logo h1 {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-1);
      margin-top: 8px;
      letter-spacing: -.3px;
    }

    .logo p {
      font-size: 14px;
      color: var(--text-3);
      margin-top: 4px;
    }

    .tab-bar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 24px;
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: var(--text-2);
      font-size: 15px;
      font-weight: 600;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--bg-2);
      color: var(--text-1);
    }

    .tab-btn:hover {
      color: var(--text-1);
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-2);
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="file"] {
      width: 100%;
      background: var(--bg-2);
      border: 1px solid var(--bg-3);
      color: var(--text-1);
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(88, 101, 242, 0.1);
    }

    input::placeholder {
      color: var(--text-3);
    }

    .file-input-wrapper {
      position: relative;
      display: inline-block;
      width: 100%;
    }

    .file-input-wrapper input[type="file"] {
      display: none;
    }

    .file-input-label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100px;
      height: 100px;
      background: var(--bg-2);
      border: 2px dashed var(--bg-3);
      border-radius: 50%;
      cursor: pointer;
      font-size: 48px;
      transition: all 0.2s;
    }

    .file-input-label:hover {
      border-color: var(--accent);
      background: rgba(88, 101, 242, 0.05);
    }

    .text-center {
      text-align: center;
      font-size: 13px;
      color: var(--text-3);
    }

    .btn {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover {
      background: var(--accent-h);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .hidden {
      display: none;
    }

    .message {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 14px;
      font-weight: 500;
    }

    .message.success {
      background: rgba(35, 165, 90, 0.15);
      color: #23a55a;
      border: 1px solid rgba(35, 165, 90, 0.3);
    }

    .message.error {
      background: rgba(237, 66, 69, 0.15);
      color: #ed4245;
      border: 1px solid rgba(237, 66, 69, 0.3);
    }

    .divider {
      text-align: center;
      margin: 16px 0;
      font-size: 12px;
      color: var(--text-3);
    }

    .divider::before,
    .divider::after {
      content: "";
      display: inline-block;
      width: 40%;
      height: 1px;
      background: var(--bg-3);
      vertical-align: middle;
      margin: 0 8px;
    }

    .oauth-button {
      width: 100%;
      background: var(--bg-2);
      color: var(--text-1);
      border: 1px solid var(--bg-3);
      padding: 10px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .oauth-button:hover {
      background: var(--bg-3);
      border-color: var(--accent);
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    input[type="checkbox"] {
      cursor: pointer;
      width: 18px;
      height: 18px;
    }

    .checkbox-group label {
      margin: 0;
      font-size: 14px;
      text-transform: none;
      letter-spacing: normal;
      font-weight: 400;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🎙️</div>
    <h1>VoiceHub</h1>
    <p>Voice, video & chat</p>
  </div>

  <div class="tab-bar">
    <button id="loginTab" class="tab-btn active">Sign In</button>
    <button id="registerTab" class="tab-btn">Create Account</button>
  </div>

  <div id="loginMsg"></div>
  <div id="registerMsg"></div>

  <form id="loginForm">
    <div class="form-group">
      <label for="loginUsername">Username</label>
      <input id="loginUsername" type="text" placeholder="Enter your username" />
    </div>

    <div class="form-group">
      <label for="loginPassword">Password</label>
      <input id="loginPassword" type="password" placeholder="Enter your password" />
    </div>

    <div class="checkbox-group">
      <input id="rememberMe" type="checkbox" />
      <label for="rememberMe">Remember me</label>
    </div>

    <button type="submit" class="btn">Sign In</button>
  </form>

  <form id="registerForm" class="hidden">
    <div class="form-group">
      <label for="regUsername">Username</label>
      <input id="regUsername" type="text" placeholder="Choose a username" />
    </div>

    <div class="form-group">
      <label for="regEmail">Email</label>
      <input id="regEmail" type="email" placeholder="Enter your email" />
    </div>

    <div class="form-group">
      <label for="regPassword">Password</label>
      <input id="regPassword" type="password" placeholder="Create a password" />
    </div>

    <div class="form-group">
      <label for="regConfirmPassword">Confirm Password</label>
      <input id="regConfirmPassword" type="password" placeholder="Confirm your password" />
    </div>

    <div class="form-group">
      <label>Profile Picture (optional)</label>
      <div class="file-input-wrapper">
        <input id="avatarInput" type="file" accept="image/*" />
        <label for="avatarInput" class="file-input-label">😊</label>
      </div>
      <div class="text-center" style="margin-top: 8px;">
        Click the circle to upload a photo.<br />
        JPG, PNG, GIF or WebP · max 8 MB<br />
        Animated GIFs supported!
      </div>
    </div>

    <button type="submit" class="btn">Create Account</button>
  </form>
</div>

<script>
  const AUTH_URL = "https://lobby-auth-server.onrender.com";

  // ── Tab switching ────────────────────────────────────────
  document.getElementById("loginTab").addEventListener("click", () => {
    document.getElementById("loginTab").classList.add("active");
    document.getElementById("registerTab").classList.remove("active");
    document.getElementById("loginForm").classList.remove("hidden");
    document.getElementById("registerForm").classList.add("hidden");
    document.getElementById("loginMsg").textContent = "";
    document.getElementById("registerMsg").textContent = "";
  });

  document.getElementById("registerTab").addEventListener("click", () => {
    document.getElementById("registerTab").classList.add("active");
    document.getElementById("loginTab").classList.remove("active");
    document.getElementById("registerForm").classList.remove("hidden");
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("loginMsg").textContent = "";
    document.getElementById("registerMsg").textContent = "";
  });

  // ── Message display ────────────────────────────────────────
  function showMsg(elementId, message, type) {
    const el = document.getElementById(elementId);
    el.textContent = message;
    el.className = `message ${type}`;
  }

  // ── Login handler ────────────────────────────────────────
  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const username = document.getElementById("loginUsername").value;
    const password = document.getElementById("loginPassword").value;
    const remember = document.getElementById("rememberMe").checked;
    const btn = e.target.querySelector("button[type=submit]");

    if (!username || !password) return showMsg("loginMsg", "Please fill in all fields.", "error");

    btn.disabled = true;
    btn.textContent = "Signing in…";

    try {
      const res  = await fetch(`${AUTH_URL}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (!res.ok) {
        showMsg("loginMsg", data.error || "Login failed.", "error");
        btn.disabled = false;
        btn.textContent = "Sign In";
        return;
      }

      if (remember) localStorage.setItem("vh_token", data.token);
      else          sessionStorage.setItem("vh_token", data.token);

      launchApp(data.token, data.user.isAdmin);
    } catch {
      showMsg("loginMsg", "Could not reach auth server. Is it running?", "error");
      btn.disabled = false;
      btn.textContent = "Sign In";
    }
  });

  // ── Register handler ────────────────────────────────────────
  document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const username = document.getElementById("regUsername").value;
    const email = document.getElementById("regEmail").value;
    const password = document.getElementById("regPassword").value;
    const confirmPassword = document.getElementById("regConfirmPassword").value;
    const btn = e.target.querySelector("button[type=submit]");

    if (!username || !email || !password || !confirmPassword) {
      return showMsg("registerMsg", "Please fill in all fields.", "error");
    }

    if (password !== confirmPassword) {
      return showMsg("registerMsg", "Passwords do not match.", "error");
    }

    btn.disabled = true;
    btn.textContent = "Creating Account…";

    try {
      const res  = await fetch(`${AUTH_URL}/auth/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, email, password })
      });
      const data = await res.json();

      if (!res.ok) {
        showMsg("registerMsg", data.error || "Registration failed.", "error");
        btn.disabled = false;
        btn.textContent = "Create Account";
        return;
      }

      localStorage.setItem("vh_token", data.token);
      launchApp(data.token, data.user.isAdmin || false);
    } catch {
      showMsg("registerMsg", "Could not reach auth server. Is it running?", "error");
      btn.disabled = false;
      btn.textContent = "Create Account";
    }
  });

  // ── Avatar upload handler ────────────────────────────────────────
  document.getElementById("avatarInput").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const maxSize = 8 * 1024 * 1024;
    if (file.size > maxSize) {
      return showMsg("registerMsg", "File is too large. Maximum 8 MB.", "error");
    }

    const formData = new FormData();
    formData.append("avatar", file);

    try {
      await fetch(`${AUTH_URL}/auth/avatar`, {
        method: "POST",
        body: formData
      });
    } catch (err) {
      console.error("Avatar upload error:", err);
    }
  });

  // ── Launch app ────────────────────────────────────────
  function launchApp(token, isAdmin) {
    localStorage.setItem("vh_token", token);
    window.location.href = "index.html";
  }
</script>
</body>
</html>
